name: Release

# Build the WASM core, assemble the `@splatwalk/core` package, and attach the
# artifacts (wasm glue + binary, types, and the npm tarball) to a GitHub release.
# Triggered by a semver tag like `v0.3.0`.
#
# Publishing to npm is done MANUALLY (see RELEASING.md): download/build the
# tarball and `npm publish` with your npm login + 2FA OTP. CI deliberately does
# not publish to npm - the OIDC Trusted Publishing path was never authorized for
# this package, so leaving it in only produced failing runs.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub release

jobs:
  release:
    runs-on: ubuntu-latest    # Trusted Publishing requires a cloud-hosted runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} (${TAG_VERSION}) does not match package.json version ${PKG_VERSION}" >&2
            exit 1
          fi
          echo "Version OK: ${PKG_VERSION}"

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      # Pin wasm-bindgen-cli to the exact version used by the crate so the JS glue
      # always matches the binary (see wasm-splatwalk/Cargo.toml).
      - name: Install wasm-bindgen-cli (pinned)
        run: cargo install wasm-bindgen-cli --version 0.2.106 --locked

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build WASM core
        run: ./scripts/build.sh

      # build-package.sh compiles the framework-agnostic floor module with
      # `npx --no-install tsc`, so the project's pinned TypeScript must be present
      # locally (the release job otherwise installs no node deps).
      - name: Install TypeScript (floor module compile)
        run: npm install --no-save "typescript@$(node -p "require('./package.json').devDependencies.typescript")"

      - name: Assemble @splatwalk/core package
        run: ./scripts/build-package.sh

      - name: Package tarball
        run: cd dist-pkg && npm pack && mv *.tgz ..

      - name: Select release notes
        id: notes
        run: |
          NOTES="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES" ]; then
            echo "path=${NOTES}" >> "$GITHUB_OUTPUT"
          else
            echo "path=CHANGELOG.md" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pkg/wasm_splatwalk/wasm_splatwalk.js
            pkg/wasm_splatwalk/wasm_splatwalk_bg.wasm
            package/wasm_splatwalk.d.ts
            splatwalk-core-*.tgz
          body_path: ${{ steps.notes.outputs.path }}

      # npm publish is intentionally NOT done here - publish manually from the
      # attached `splatwalk-core-*.tgz` (or a local `npm run build:package`):
      #   npm login                       # 2FA account
      #   npm publish dist-pkg --otp=XXXXXX
      - name: Publish reminder
        run: echo "Build + GitHub release done. Publish @splatwalk/core to npm manually (see RELEASING.md)."
